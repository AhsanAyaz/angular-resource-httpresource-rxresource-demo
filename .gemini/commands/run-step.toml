description = "Run a step of the resource/httpResource/rxResource work-along (usage: /run-step 1)"
prompt = """
You are running one step of the "resource() vs httpResource() vs rxResource()" work-along
video in this repo.

The step number is: {{args}}

Do this:
1. Read `.video-steps/RUNNER.md` for the execution rules.
2. Read `.video-steps/step-{{args}}.md` for this step's spec.
3. Follow RUNNER.md exactly: overwrite each `FILE:` block with its exact contents, then
   write `STEP-{{args}}-EXPLAINED.md` from the spec's Explanation block, then print a
   3 to 4 line recap.

Rules:
- The step spec is the single source of truth. Apply it verbatim, do not improvise code.
- Keep `STEP-{{args}}-EXPLAINED.md` at 12 lines or fewer. No em-dashes.
- Do not run git or commit. Do not rebuild; the dev server hot-reloads.
"""
